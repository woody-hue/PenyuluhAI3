<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyuluh Agama Islam AI</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:       #0d5c4a;
  --teal-mid:   #1a7a62;
  --teal-light: #2eaa8a;
  --teal-glow:  rgba(13,92,74,.12);
  --gold:       #b8862a;
  --gold-l:     #d4a844;
  --cream:      #f8f4ec;
  --cream-dark: #ddd0b8;
  --ink:        #1a1812;
  --ink-mid:    #3c3728;
  --ink-soft:   #6b6252;
  --ink-muted:  #9a8f80;
  --white:      #ffffff;
  --sidebar-w:  272px;
  --header-h:   56px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── HEADER ── */
.header {
  height: var(--header-h);
  background: linear-gradient(135deg, var(--teal) 0%, #072e24 100%);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 20px rgba(0,0,0,.25);
  z-index: 50;
}
.h-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(184,134,42,.4);
}
.h-title { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.2; }
.h-sub   { color: rgba(255,255,255,.5); font-size: 10px; font-weight: 300; }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  padding: 4px 10px; border-radius: 20px;
  font-size: 10px; color: rgba(255,255,255,.75); font-weight: 500;
}
.badge-dot {
  width: 6px; height: 6px; background: #4ade80;
  border-radius: 50%; animation: pdot 2s infinite;
}
@keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.menu-btn {
  width: 32px; height: 32px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px; color: #fff; font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.menu-btn:hover { background: rgba(255,255,255,.2); }

/* ── BODY ── */
.app-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--cream-dark);
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow: hidden;
  transition: width .3s ease;
}
.sidebar.closed { width: 0; }

.s-tabs { display: flex; border-bottom: 1px solid var(--cream-dark); flex-shrink: 0; }
.s-tab {
  flex: 1; padding: 9px 2px; font-size: 10px; font-weight: 600;
  color: var(--ink-soft); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; text-align: center;
  text-transform: uppercase; letter-spacing: .3px; transition: all .2s;
  white-space: nowrap;
}
.s-tab.on { color: var(--teal); border-bottom-color: var(--teal); background: var(--teal-glow); }

.s-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.s-panel.on { display: flex; }

/* Sholat */
.sh-hdr {
  padding: 12px 14px;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  flex-shrink: 0;
}
.sh-label { color: rgba(255,255,255,.6); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.sh-city  { color: #fff; font-size: 15px; font-weight: 600; }
.sh-date  { color: rgba(255,255,255,.5); font-size: 10px; margin-top: 2px; }
.sh-next  {
  margin-top: 8px; background: rgba(255,255,255,.12);
  border-radius: 8px; padding: 7px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.sh-next-label { color: rgba(255,255,255,.6); font-size: 9px; text-transform: uppercase; letter-spacing: .5px; }
.sh-next-name  { color: #fff; font-size: 13px; font-weight: 700; }
.sh-next-time  { color: var(--gold-l); font-size: 12px; font-weight: 600; }

.sh-search {
  padding: 8px 10px; border-bottom: 1px solid var(--cream-dark);
  display: flex; gap: 5px; flex-shrink: 0;
}
.sh-search input {
  flex: 1; padding: 6px 9px;
  border: 1.5px solid var(--cream-dark); border-radius: 7px;
  font-size: 12px; font-family: inherit; color: var(--ink);
  background: var(--cream); outline: none;
}
.sh-search input:focus { border-color: var(--teal-light); }
.sh-go {
  padding: 6px 11px; background: var(--teal);
  color: #fff; border: none; border-radius: 7px;
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.sh-go:hover { background: var(--teal-mid); }

.jadwal-list { flex: 1; overflow-y: auto; padding: 8px 10px; }
.j-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: 9px; margin-bottom: 5px;
  background: var(--cream); border: 1.5px solid transparent;
}
.j-item.hi { background: var(--teal-glow); border-color: var(--teal-light); }
.j-icon { font-size: 14px; margin-right: 7px; }
.j-name { font-size: 12px; font-weight: 600; color: var(--ink-mid); }
.j-time { font-size: 13px; font-weight: 700; color: var(--teal); font-variant-numeric: tabular-nums; }

/* Quran */
.q-search { padding: 10px; border-bottom: 1px solid var(--cream-dark); flex-shrink: 0; }
.q-search input {
  width: 100%; padding: 7px 10px;
  border: 1.5px solid var(--cream-dark); border-radius: 7px;
  font-size: 12px; font-family: inherit; color: var(--ink);
  background: var(--cream); outline: none;
}
.q-search input:focus { border-color: var(--teal-light); }
.surah-list { flex: 1; overflow-y: auto; padding: 6px; }
.surah-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; border-radius: 8px; cursor: pointer; transition: background .15s;
}
.surah-item:hover { background: var(--cream); }
.s-num {
  width: 26px; height: 26px; background: var(--teal-glow);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--teal); flex-shrink: 0;
}
.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 11px; font-weight: 600; color: var(--ink-mid); }
.s-meta { font-size: 9px; color: var(--ink-muted); }
.s-ar   { font-family: 'Amiri', serif; font-size: 13px; color: var(--teal); }

/* Hadis */
.h-nav {
  padding: 8px 10px; border-bottom: 1px solid var(--cream-dark);
  display: flex; gap: 6px; flex-shrink: 0;
}
.h-nav select {
  flex: 1; padding: 6px 8px; border: 1.5px solid var(--cream-dark);
  border-radius: 7px; font-size: 11px; font-family: inherit;
  color: var(--ink); background: var(--cream); outline: none;
}
.h-reload {
  padding: 6px 10px; background: var(--teal);
  color: #fff; border: none; border-radius: 7px;
  font-size: 13px; cursor: pointer;
}
.h-content { flex: 1; overflow-y: auto; padding: 10px; }
.h-card {
  background: var(--cream); border-radius: 10px;
  padding: 11px; border-left: 3px solid var(--teal-light); margin-bottom: 10px;
}
.h-num { font-size: 10px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.h-ar  { font-family: 'Amiri', serif; font-size: 15px; line-height: 2; text-align: right; direction: rtl; color: var(--ink-mid); margin-bottom: 6px; }
.h-id  { font-size: 11px; color: var(--ink-soft); line-height: 1.6; }
.h-send {
  margin-top: 8px; width: 100%; padding: 6px;
  background: var(--teal-glow); border: 1px solid var(--teal-light);
  border-radius: 6px; color: var(--teal); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.h-send:hover { background: rgba(13,92,74,.2); }

/* ── CHAT ── */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.messages  { flex: 1; overflow-y: auto; padding: 18px 14px 14px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; padding: 20px;
  text-align: center; gap: 14px;
}
.w-emblem {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--teal) 0%, #072e24 100%);
  border-radius: 22px; display: flex; align-items: center;
  justify-content: center; font-size: 36px;
  box-shadow: 0 8px 28px rgba(13,92,74,.3);
  animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.w-bism { font-family: 'Amiri', serif; font-size: 26px; color: var(--teal); line-height: 1.8; }
.w-tag  { font-size: 14px; color: var(--ink-mid); font-style: italic; max-width: 340px; line-height: 1.6; }
.w-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 420px; }
.w-chip {
  background: var(--white); border: 1.5px solid var(--cream-dark);
  border-radius: 18px; padding: 6px 13px; font-size: 11px;
  font-weight: 500; color: var(--ink-mid); cursor: pointer;
  transition: all .2s; font-family: inherit;
}
.w-chip:hover { background: var(--teal); border-color: var(--teal); color: #fff; transform: translateY(-1px); }

/* Messages */
.msg-row {
  display: flex; gap: 9px;
  max-width: 680px; width: 100%; margin: 0 auto;
  animation: su .3s ease;
}
@keyframes su { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg-row.user { flex-direction: row-reverse; }
.msg-av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; align-self: flex-end; color: #fff;
}
.msg-av.ai   { background: linear-gradient(135deg, var(--teal), var(--teal-mid)); }
.msg-av.user { background: linear-gradient(135deg, var(--gold), var(--gold-l)); }
.msg-body { flex: 1; min-width: 0; }
.msg-name {
  font-size: 9px; font-weight: 600; color: var(--ink-muted);
  margin-bottom: 3px; letter-spacing: .3px; text-transform: uppercase;
}
.msg-row.user .msg-name { text-align: right; }
.msg-bubble {
  display: inline-block; padding: 11px 14px;
  border-radius: 15px; font-size: 13px; line-height: 1.75; max-width: 88%;
}
.msg-bubble.ai {
  background: var(--white); border: 1px solid var(--cream-dark);
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 10px rgba(0,0,0,.06); color: var(--ink-mid);
}
.msg-bubble.user {
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  color: #fff; border-bottom-right-radius: 4px; float: right;
}
.msg-ref {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; color: var(--teal);
  background: rgba(13,92,74,.08); padding: 2px 8px;
  border-radius: 9px; margin: 3px 2px 0 0;
}

/* Typing */
.typing-row { display: flex; gap: 9px; max-width: 680px; margin: 0 auto; }
.typing-bub {
  display: flex; gap: 4px;
  background: var(--white); border: 1px solid var(--cream-dark);
  border-radius: 15px; border-bottom-left-radius: 4px;
  padding: 12px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06);
}
.typing-bub span {
  width: 6px; height: 6px; background: var(--teal-light);
  border-radius: 50%; animation: jmp 1.2s infinite;
}
.typing-bub span:nth-child(2) { animation-delay: .18s; }
.typing-bub span:nth-child(3) { animation-delay: .36s; }
@keyframes jmp { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── INPUT ZONE ── */
.input-zone {
  border-top: 1px solid var(--cream-dark);
  background: rgba(248,244,236,.96);
  backdrop-filter: blur(10px);
  padding: 8px 14px 12px; flex-shrink: 0;
}
.topic-row {
  display: flex; gap: 5px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 7px;
  max-width: 680px; margin: 0 auto;
}
.topic-row::-webkit-scrollbar { display: none; }
.t-pill {
  flex-shrink: 0; padding: 4px 11px; border-radius: 14px;
  font-size: 10px; font-weight: 600;
  border: 1.5px solid var(--cream-dark);
  background: var(--white); color: var(--ink-soft);
  cursor: pointer; transition: all .18s; white-space: nowrap;
  font-family: inherit;
}
.t-pill:hover, .t-pill.on {
  background: var(--teal); border-color: var(--teal); color: #fff;
}
.input-row {
  display: flex; gap: 7px; align-items: flex-end;
  max-width: 680px; margin: 0 auto;
}
.input-field {
  flex: 1; padding: 10px 13px;
  border: 1.5px solid var(--cream-dark); border-radius: 13px;
  font-size: 13px; font-family: inherit; color: var(--ink);
  background: var(--white); resize: none; max-height: 90px;
  outline: none; transition: border-color .2s, box-shadow .2s; line-height: 1.5;
}
.input-field:focus {
  border-color: var(--teal-mid);
  box-shadow: 0 0 0 3px rgba(13,92,74,.1);
}
.input-field::placeholder { color: var(--ink-muted); }
.send-btn {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  border: none; border-radius: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 3px 12px rgba(13,92,74,.35);
  transition: transform .15s;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:active { transform: scale(.96); }
.send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.send-btn svg { fill: white; width: 18px; height: 18px; }
.input-hint { text-align: center; font-size: 10px; color: var(--ink-muted); margin-top: 5px; }

/* ── QURAN MODAL ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,20,15,.5); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 18px;
  width: 92%; max-width: 520px; max-height: 82vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: popin .25s ease;
}
@keyframes popin { from{opacity:0;transform:scale(.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-hdr {
  background: linear-gradient(135deg, var(--teal), #072e24);
  padding: 14px 16px; display: flex; align-items: center; gap: 10px;
}
.modal-hdr h3 { color: #fff; font-size: 15px; font-weight: 600; flex: 1; }
.modal-close {
  width: 28px; height: 28px; background: rgba(255,255,255,.15);
  border: none; border-radius: 7px; color: #fff; font-size: 14px; cursor: pointer;
}
.modal-body { flex: 1; overflow-y: auto; padding: 12px; }
.ayat-item {
  padding: 10px; border-radius: 9px; margin-bottom: 8px;
  background: var(--cream); border: 1px solid var(--cream-dark);
}
.ayat-num {
  display: inline-block; width: 24px; height: 24px;
  background: var(--teal-glow); border-radius: 50%;
  font-size: 10px; font-weight: 700; color: var(--teal);
  text-align: center; line-height: 24px; margin-bottom: 6px;
}
.ayat-ar {
  font-family: 'Amiri', serif; font-size: 18px; line-height: 2.2;
  text-align: right; direction: rtl; color: var(--ink-mid); margin-bottom: 7px;
}
.ayat-tr { font-size: 11px; color: var(--ink-soft); line-height: 1.6; font-style: italic; }
.ayat-send {
  margin-top: 7px; width: 100%; padding: 6px;
  background: var(--teal-glow); border: 1px solid var(--teal-light);
  border-radius: 7px; color: var(--teal); font-size: 10px;
  font-weight: 600; cursor: pointer; font-family: inherit;
}
.ayat-send:hover { background: rgba(13,92,74,.2); }

/* Spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--cream-dark);
  border-top-color: var(--teal);
  border-radius: 50%; animation: spin .7s linear infinite;
  display: inline-block; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 76px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 9px 16px;
  border-radius: 18px; font-size: 11px; font-weight: 500;
  opacity: 0; transition: all .3s; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Error banner */
.error-banner {
  background: #fef2f2; border: 1px solid #fca5a5;
  color: #dc2626; padding: 10px 14px; font-size: 12px;
  text-align: center; flex-shrink: 0;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 3px; }

@media (max-width: 600px) {
  .sidebar {
    position: absolute; top: var(--header-h); left: 0; bottom: 0;
    z-index: 40; box-shadow: 4px 0 20px rgba(0,0,0,.1);
  }
  .sidebar.closed { transform: translateX(-100%); width: var(--sidebar-w); }
  .badge { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="h-logo">🕌</div>
  <div>
    <div class="h-title">Penyuluh Agama Islam AI</div>
    <div class="h-sub">Al-Qur'an · Sunnah · Jadwal Sholat · Hadits</div>
  </div>
  <div class="h-right">
    <div class="badge"><span class="badge-dot"></span> myQuran API</div>
    <button class="menu-btn" onclick="toggleSidebar()" title="Panel Data Islami">☰</button>
  </div>
</header>

<!-- ERROR BANNER (disembunyikan secara default) -->
<div class="error-banner" id="errorBanner" style="display:none"></div>

<!-- BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="s-tabs">
      <button class="s-tab on"  onclick="setTab('sholat',this)">🕌 Sholat</button>
      <button class="s-tab"     onclick="setTab('quran',this)">📖 Qur'an</button>
      <button class="s-tab"     onclick="setTab('hadis',this)">📜 Hadis</button>
    </div>

    <!-- PANEL SHOLAT -->
    <div class="s-panel on" id="panel-sholat">
      <div class="sh-hdr">
        <div class="sh-label">Jadwal Sholat</div>
        <div class="sh-city" id="shCity">— Pilih Kota —</div>
        <div class="sh-date" id="shDate"></div>
        <div class="sh-next" id="shNext" style="display:none">
          <div>
            <div class="sh-next-label">Berikutnya</div>
            <div class="sh-next-name" id="nxName">—</div>
          </div>
          <div class="sh-next-time" id="nxTime">—</div>
        </div>
      </div>
      <div class="sh-search">
        <input id="kotaInput" type="text" placeholder="Cari kota..." onkeydown="if(event.key==='Enter')cariKota()">
        <button class="sh-go" onclick="cariKota()" id="shGoBtn">Cari</button>
      </div>
      <div class="jadwal-list" id="jadwalList">
        <div style="text-align:center;padding:24px;color:var(--ink-muted);font-size:11px;line-height:1.6">
          Ketik nama kota lalu tekan Cari.
        </div>
      </div>
    </div>

    <!-- PANEL QURAN -->
    <div class="s-panel" id="panel-quran">
      <div class="q-search">
        <input id="surahSearch" type="text" placeholder="Cari surah..." oninput="filterSurah()">
      </div>
      <div class="surah-list" id="surahList">
        <div style="text-align:center;padding:20px"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- PANEL HADIS -->
    <div class="s-panel" id="panel-hadis">
      <div class="h-nav">
        <select id="hadisSelect" onchange="loadHadis()">
          <option value="abu-dawud">Abu Dawud</option>
          <option value="bukhari">Bukhari</option>
          <option value="muslim">Muslim</option>
          <option value="tirmidzi">Tirmidzi</option>
          <option value="nasai">Nasa'i</option>
          <option value="ibnu-majah">Ibnu Majah</option>
        </select>
        <button class="h-reload" onclick="loadHadis()" title="Hadits acak lainnya">🔄</button>
      </div>
      <div class="h-content" id="hadisContent">
        <div style="text-align:center;padding:20px"><span class="spinner"></span></div>
      </div>
    </div>
  </aside>
