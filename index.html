<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyuluh Agama Islam AI</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0d5c4a; --teal-mid: #1a7a62; --teal-light: #2eaa8a; --teal-glow: rgba(13,92,74,.12);
  --gold: #b8862a; --gold-l: #d4a844; --cream: #f8f4ec; --cream-dark: #ddd0b8;
  --ink: #1a1812; --ink-mid: #3c3728; --ink-soft: #6b6252; --ink-muted: #9a8f80;
  --white: #ffffff; --sidebar-w: 272px; --header-h: 56px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--ink); display: flex; flex-direction: column; height: 100dvh; }
.header { height: var(--header-h); background: linear-gradient(135deg, var(--teal) 0%, #072e24 100%); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 20px rgba(0,0,0,.25); z-index: 50; }
.h-logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), var(--gold-l)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 10px rgba(184,134,42,.4); }
.h-title { color: #fff; font-size: 15px; font-weight: 600; }
.h-sub { color: rgba(255,255,255,.5); font-size: 10px; }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.menu-btn { width: 32px; height: 32px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.app-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--cream-dark); display: flex; flex-direction: column; flex-shrink: 0; transition: transform .3s ease, width .3s ease; }
.sidebar.closed { width: 0; overflow: hidden; }
.s-tabs { display: flex; border-bottom: 1px solid var(--cream-dark); }
.s-tab { flex: 1; padding: 9px 2px; font-size: 10px; font-weight: 600; color: var(--ink-soft); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; text-transform: uppercase; }
.s-tab.on { color: var(--teal); border-bottom-color: var(--teal); background: var(--teal-glow); }
.s-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.s-panel.on { display: flex; }
.sh-hdr { padding: 12px 14px; background: linear-gradient(135deg, var(--teal), var(--teal-mid)); }
.sh-city { color: #fff; font-size: 15px; font-weight: 600; }
.sh-date { color: rgba(255,255,255,.5); font-size: 10px; }
.sh-search, .q-search, .h-nav { padding: 8px 10px; border-bottom: 1px solid var(--cream-dark); display: flex; gap: 5px; }
.sh-search input, .q-search input, .h-nav select { flex: 1; padding: 6px 9px; border: 1.5px solid var(--cream-dark); border-radius: 7px; font-size: 12px; background: var(--cream); outline: none; }
.sh-go, .h-reload, .h-reset { padding: 6px 11px; background: var(--teal); color: #fff; border: none; border-radius: 7px; font-size: 11px; cursor: pointer; }
.h-reset { background: #dc2626; margin-left: 5px; }
.jadwal-list, .surah-list, .h-content { flex: 1; overflow-y: auto; padding: 8px; }
.j-item, .surah-item, .h-card { background: var(--cream); padding: 9px; border-radius: 9px; margin-bottom: 5px; border: 1px solid var(--cream-dark); }
.j-item { display: flex; justify-content: space-between; }
.j-time { font-weight: 700; color: var(--teal); }
.s-num { background: var(--teal-glow); color: var(--teal); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; display: inline-block; }
.s-name { font-size: 11px; font-weight: 600; }
.h-ar, .ayat-ar { font-family: 'Amiri', serif; font-size: 16px; text-align: right; direction: rtl; margin: 8px 0; line-height: 2; }
.h-id, .ayat-tr { font-size: 11px; line-height: 1.5; color: var(--ink-soft); }
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.msg-row { display: flex; gap: 9px; max-width: 680px; width: 100%; margin: 0 auto; }
.msg-row.user { flex-direction: row-reverse; }
.msg-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; }
.msg-av.ai { background: var(--teal); }
.msg-av.user { background: var(--gold); }
.msg-bubble { padding: 11px 14px; border-radius: 15px; font-size: 13px; line-height: 1.6; max-width: 85%; }
.msg-bubble.ai { background: var(--white); border: 1px solid var(--cream-dark); border-bottom-left-radius: 4px; }
.msg-bubble.user { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }
.input-zone { background: var(--white); padding: 10px; border-top: 1px solid var(--cream-dark); }
.topic-row { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.t-pill { padding: 4px 10px; border-radius: 12px; font-size: 10px; border: 1px solid var(--cream-dark); background: var(--cream); cursor: pointer; white-space: nowrap; }
.t-pill.on { background: var(--teal); color: #fff; }
.input-row { display: flex; gap: 7px; max-width: 680px; margin: 0 auto; }
.input-field { flex: 1; padding: 10px; border: 1.5px solid var(--cream-dark); border-radius: 10px; font-size: 13px; outline: none; }
.send-btn { width: 40px; background: var(--teal); color: #fff; border: none; border-radius: 10px; cursor: pointer; }
.error-banner { background: #fef2f2; color: #dc2626; padding: 10px; text-align: center; font-size: 12px; display: none; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; width: 90%; max-width: 500px; max-height: 80vh; border-radius: 15px; display: flex; flex-direction: column; }
.modal-hdr { background: var(--teal); padding: 12px; color: #fff; display: flex; justify-content: space-between; border-radius: 15px 15px 0 0; }
.modal-body { overflow-y: auto; padding: 12px; }
.ayat-item { background: var(--cream); padding: 10px; border-radius: 8px; margin-bottom: 8px; }
.btn-send { background: var(--teal-glow); color: var(--teal); border: 1px solid var(--teal-light); padding: 6px; width: 100%; border-radius: 6px; margin-top: 8px; cursor: pointer; font-size: 11px; }

@media (max-width: 768px) {
  .sidebar { position: absolute; height: calc(100vh - var(--header-h)); z-index: 40; }
  .sidebar.closed { transform: translateX(-100%); width: var(--sidebar-w); }
}
</style>
</head>
<body>

<header class="header">
  <div class="h-logo">🕌</div>
  <div><div class="h-title">Penyuluh AI</div><div class="h-sub">Qur'an · Jadwal · Hadits (Groq Engine)</div></div>
  <div class="h-right">
    <button class="h-reset" onclick="resetApiKey()" title="Ganti API Key">🔑</button>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  </div>
</header>
<div class="error-banner" id="errorBanner"></div>

<div class="app-body">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="s-tabs">
      <button class="s-tab on" onclick="setTab('sholat',this)">Sholat</button>
      <button class="s-tab" onclick="setTab('quran',this)">Qur'an</button>
      <button class="s-tab" onclick="setTab('hadis',this)">Hadis</button>
    </div>
    
    <div class="s-panel on" id="panel-sholat">
      <div class="sh-hdr"><div class="sh-city" id="shCity">Pilih Kota</div><div class="sh-date" id="shDate"></div></div>
      <div class="sh-search"><input id="kotaInput" placeholder="Cari kota..." onkeydown="if(event.key==='Enter')cariKota()"><button class="sh-go" onclick="cariKota()">Cari</button></div>
      <div class="jadwal-list" id="jadwalList"></div>
    </div>
    
    <div class="s-panel" id="panel-quran">
      <div class="q-search"><input id="surahSearch" placeholder="Cari surah..." oninput="filterSurah()"></div>
      <div class="surah-list" id="surahList">Memuat...</div>
    </div>
    
    <div class="s-panel" id="panel-hadis">
      <div class="h-nav">
        <select id="hadisSelect"><option value="bukhari">Bukhari</option><option value="muslim">Muslim</option></select>
        <button class="h-reload" onclick="loadHadis()">🔄</button>
      </div>
      <div class="h-content" id="hadisContent">Memuat...</div>
    </div>
  </aside>

  <!-- CHAT -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div style="text-align:center; padding: 20px; color: var(--ink-muted); font-size:13px;">
        <h2>Assalamu'alaikum</h2>
        Saya siap membantu pertanyaan seputar agama Islam (Powered by Groq AI).
      </div>
    </div>
    <div class="input-zone">
      <div class="topic-row">
        <button class="t-pill on" onclick="setTopic(this,'')">Umum</button>
        <button class="t-pill" onclick="setTopic(this,'Fiqih')">Fiqih</button>
        <button class="t-pill" onclick="setTopic(this,'Akidah')">Akidah</button>
        <button class="t-pill" onclick="setTopic(this,'Tafsir')">Tafsir</button>
        <button class="t-pill" onclick="setTopic(this,'Hadits')">Hadits</button>
      </div>
      <div class="input-row">
        <input type="text" id="inputField" class="input-field" placeholder="Ketik pertanyaan..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </main>
</div>

<!-- MODAL QURAN -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">Surah</h3>
      <button style="background:none;border:none;color:#fff;cursor:pointer;font-size:16px;" onclick="document.getElementById('overlay').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ==========================================
// SISTEM KEAMANAN API KEY GROQ (LOCAL STORAGE)
// ==========================================
let GROQ_API_KEY = localStorage.getItem('groq_api_key');

if (!GROQ_API_KEY || GROQ_API_KEY === 'null') {
  setTimeout(() => {
    GROQ_API_KEY = prompt(
      "🔑 Setup Groq AI:\n\n" +
      "Masukkan API Key Groq Anda.\n" +
      "Key ini hanya akan disimpan di dalam memori browser Anda (Local Storage) sehingga 100% aman."
    );
    if (GROQ_API_KEY && GROQ_API_KEY.trim() !== '') {
      localStorage.setItem('groq_api_key', GROQ_API_KEY.trim());
    } else {
      showError("⚠️ Anda belum memasukkan API Key. Aplikasi AI tidak akan berfungsi.");
    }
  }, 500);
}

function resetApiKey() {
  if(confirm("Apakah Anda yakin ingin menghapus/mengganti API Key Groq?")) {
    localStorage.removeItem('groq_api_key');
    location.reload();
  }
}

// ==========================================
// UI LOGIC
// ==========================================
let isMobile = window.innerWidth <= 768;
let sidebarOpen = !isMobile;
if(isMobile) document.getElementById('sidebar').classList.add('closed');

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
}

let chatHistory = []; 
let currentTopic = ''; 
let allSurah = [];

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = msg; 
  b.style.display = msg ? 'block' : 'none';
}

function setTab(name, el) {
  document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.s-panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); 
  document.getElementById('panel-'+name).classList.add('on');
}

function setTopic(el, t) {
  document.querySelectorAll('.t-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); 
  currentTopic = t;
}

// ==========================================
// FUNGSI CHAT GROQ AI
// ==========================================
async function sendMsg(textOverride) {
  const field = document.getElementById('inputField');
  const text = (textOverride || field.value).trim();
  if(!text) return;
  
  if (!GROQ_API_KEY || GROQ_API_KEY.trim() === '') {
    alert("API Key Groq belum dimasukkan. Silakan klik ikon kunci 🔑 di pojok kanan atas.");
    return;
  }

  field.value = '';
  if(isMobile && sidebarOpen) toggleSidebar(); 

  const msgs = document.getElementById('messages');
  msgs.innerHTML += `<div class="msg-row user"><div class="msg-av user">👤</div><div class="msg-bubble user">${text}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({role:'user', content:text});

  const typingId = 'typing-' + Date.now();
  msgs.innerHTML += `<div class="msg-row ai" id="${typingId}"><div class="msg-av ai">☪</div><div class="msg-bubble ai">Mencari jawaban...</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
        const messagesToSend = [
      { 
        role: 'system', 
        content: `Anda adalah Penyuluh Agama Islam profesional di bawah naungan Kementerian Agama. 
        Tugas Anda adalah memberikan bimbingan, nasihat, dan jawaban seputar agama Islam yang menyejukkan, moderat, dan menjaga kerukunan umat.
        
        Aturan wajib Anda:
        1. Selalu landasi jawaban dengan Al-Qur'an dan Sunnah (sertakan nama surah/ayat atau perawi hadits jika relevan).
        2. Jika membahas fiqih yang memiliki perbedaan pendapat (khilafiyah), sebutkan pandangan mazhab yang umum di Indonesia (terutama Syafi'i) dengan bijak tanpa menyalahkan pandangan lain.
        3. Gunakan bahasa Indonesia yang baku, santun, terstruktur, dan mudah dipahami masyarakat awam.
        4. Jangan pernah memberikan fatwa yang menghakimi. Arahkan pengguna untuk berkonsultasi langsung dengan ulama setempat untuk masalah pribadi yang kompleks.
        
        Topik diskusi saat ini: ${currentTopic || 'Umum'}.` 
      },
      ...chatHistory
    ];

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: messagesToSend,
        temperature: 0.2,
        max_tokens: 1500
      })
    });

    const data = await response.json();

    if (!response.ok) {
        throw new Error(data.error?.message || "Gagal menghubungi server Groq.");
    }

    const replyRaw = data.choices[0].message.content; 
    
    document.getElementById(typingId).remove();
    showError(''); // Clear errors
    
    // Format bold dan line break agar rapi
    let formattedReply = replyRaw.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    
    msgs.innerHTML += `<div class="msg-row ai"><div class="msg-av ai">☪</div><div class="msg-bubble ai">${formattedReply}</div></div>`;
    chatHistory.push({role:'assistant', content:replyRaw});
    msgs.scrollTop = msgs.scrollHeight;

  } catch(e) {
    document.getElementById(typingId).remove();
    showError("Groq Error: " + (e.message || "Pastikan API Key valid dan koneksi stabil."));
    chatHistory.pop();
  }
}

// ==========================================
// API MYQURAN (SHOLAT, QURAN, HADIS)
// ==========================================
async function cariKota() {
  const q = document.getElementById('kotaInput').value;
  if(!q) return;
  const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${q}`);
  const d = await res.json();
  if(d.data && d.data.length > 0) {
    document.getElementById('shCity').textContent = d.data[0].lokasi;
    const now = new Date();
    const r2 = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${d.data[0].id}/${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`);
    const d2 = await r2.json();
    const j = d2.data.jadwal;
    document.getElementById('shDate').textContent = j.tanggal;
    let html = '';
    ['imsak','subuh','terbit','dhuha','dzuhur','ashar','maghrib','isya'].forEach(k => {
      if(j[k]) html += `<div class="j-item"><span>${k.toUpperCase()}</span><span class="j-time">${j[k]}</span></div>`;
    });
    document.getElementById('jadwalList').innerHTML = html;
  } else {
    document.getElementById('jadwalList').innerHTML = '<div style="text-align:center;padding:20px;font-size:11px;">Kota tidak ditemukan.</div>';
  }
}

async function loadSurahList() {
  try {
    const res = await fetch('https://equran.id/api/v2/surat');
    const d = await res.json();
    allSurah = d.data;
    filterSurah();
  } catch(e) {
    document.getElementById('surahList').innerHTML = "<div style='text-align:center;padding:20px;'>Gagal memuat daftar surah.</div>";
  }
}

function filterSurah() {
  const q = document.getElementById('surahSearch')?.value.toLowerCase() || '';
  const list = allSurah.filter(s => s.namaLatin.toLowerCase().includes(q));
  document.getElementById('surahList').innerHTML = list.map(s => 
    `<div class="surah-item" onclick="openSurah(${s.nomor}, '${s.namaLatin}')"><span class="s-num">${s.nomor}</span> <span class="s-name">${s.namaLatin}</span> (${s.jumlahAyat} ayat)</div>`
  ).join('');
}

async function openSurah(num, name) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;'>Memuat ayat...</div>";
  try {
    const res = await fetch(`https://equran.id/api/v2/surat/${num}`);
    const d = await res.json();
    document.getElementById('modalBody').innerHTML = d.data.ayat.map(a => 
      `<div class="ayat-item"><div class="s-num">${a.nomorAyat}</div><div class="ayat-ar">${a.teksArab}</div><div class="ayat-tr">${a.teksIndonesia}</div><button class="btn-send" onclick="sendAyat('${name}', ${a.nomorAyat}, \`${a.teksArab}\`, \`${a.teksIndonesia.replace(/'/g, "")}\`)">Minta Penjelasan AI</button></div>`
    ).join('');
  } catch(e) {
    document.getElementById('modalBody').innerHTML = "Gagal memuat detail ayat.";
  }
}

function sendAyat(surah, num, ar, idn) {
  document.getElementById('overlay').style.display = 'none';
  sendMsg(`Tolong jelaskan makna dan tafsir dari QS ${surah} ayat ${num}: "${ar}" (Artinya: ${idn})`);
}

// ==========================================
// API HADITS (HADITH.GADING.DEV) - FIXED
// ==========================================
let currentHadithText = ""; // Variabel aman untuk menyimpan teks hadits

async function loadHadis() {
  document.getElementById('hadisContent').innerHTML = "<div style='text-align:center;padding:20px;'>Memuat...</div>";
  const kit = document.getElementById('hadisSelect').value; 
  
  const randomNum = Math.floor(Math.random() * 300) + 1; 
  
  try {
    const res = await fetch(`https://api.hadith.gading.dev/books/${kit}/${randomNum}`);
    const d = await res.json();
    const h = d.data.contents;
    
    // Simpan teks terjemahan ke variabel agar tidak merusak kode HTML tombol
    currentHadithText = h.id; 
    
    document.getElementById('hadisContent').innerHTML = `
      <div class="h-card">
        <strong>${kit.toUpperCase()} - No. ${h.number}</strong>
        <div class="h-ar">${h.arab}</div>
        <div class="h-id">${h.id}</div>
        <button class="btn-send" onclick="sendHadisToAI('${kit}', ${h.number})">Tanyakan ke AI</button>
      </div>`;
  } catch(e) {
    document.getElementById('hadisContent').innerHTML = "<div style='text-align:center;padding:20px;color:red;'>Gagal memuat hadits. Tekan tombol 🔄 di atas.</div>";
  }
}

// Fungsi khusus yang dipanggil oleh tombol Hadits
function sendHadisToAI(kitab, nomor) {
  if (isMobile && sidebarOpen) toggleSidebar(); // Tutup sidebar di HP
  sendMsg(`Jelaskan makna, konteks, dan pelajaran dari hadits ${kitab} nomor ${nomor}:\n"${currentHadithText}"`);
}

// Inisialisasi awal
window.onload = () => { 
  loadSurahList(); 
  loadHadis(); 
};
</script>
</body>
</html>
