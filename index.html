<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyuluh Agama Islam AI</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0d5c4a; --teal-mid: #1a7a62; --teal-light: #2eaa8a; --teal-glow: rgba(13,92,74,.12);
  --gold: #b8862a; --gold-l: #d4a844; --cream: #f8f4ec; --cream-dark: #ddd0b8;
  --ink: #1a1812; --ink-mid: #3c3728; --ink-soft: #6b6252; --ink-muted: #9a8f80;
  --white: #ffffff; --sidebar-w: 280px; --header-h: 56px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cream); color: var(--ink); display: flex; flex-direction: column; height: 100dvh; }

/* Header */
.header { height: var(--header-h); background: linear-gradient(135deg, var(--teal) 0%, #072e24 100%); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 20px rgba(0,0,0,.25); z-index: 50; }
.h-logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), var(--gold-l)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 10px rgba(184,134,42,.4); }
.h-title { color: #fff; font-size: 15px; font-weight: 600; }
.h-sub { color: rgba(255,255,255,.5); font-size: 10px; }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.menu-btn, .h-reset { width: 32px; height: 32px; border-radius: 8px; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,.15); }
.menu-btn { background: rgba(255,255,255,.1); }
.h-reset { background: #dc2626; border-color: #b91c1c; font-size: 13px; }

/* Body & Sidebar */
.app-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--cream-dark); display: flex; flex-direction: column; flex-shrink: 0; transition: transform .3s ease, width .3s ease; }
.sidebar.closed { width: 0; overflow: hidden; }
.s-tabs { display: flex; border-bottom: 1px solid var(--cream-dark); flex-shrink: 0; }
.s-tab { flex: 1; padding: 10px 2px; font-size: 10px; font-weight: 600; color: var(--ink-soft); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; text-transform: uppercase; }
.s-tab.on { color: var(--teal); border-bottom-color: var(--teal); background: var(--teal-glow); }
.s-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.s-panel.on { display: flex; }

/* Panel Sholat */
.sh-hdr { padding: 14px; background: linear-gradient(135deg, var(--teal), var(--teal-mid)); flex-shrink: 0; }
.sh-city { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.sh-date { color: rgba(255,255,255,.7); font-size: 11px; }
.sh-search, .q-search, .h-nav { padding: 10px; border-bottom: 1px solid var(--cream-dark); display: flex; gap: 6px; flex-shrink: 0; }
.sh-search input, .q-search input, .h-nav input, .h-nav select { flex: 1; padding: 8px 10px; border: 1.5px solid var(--cream-dark); border-radius: 7px; font-size: 12px; background: var(--cream); outline: none; font-family: inherit;}
.sh-go { padding: 8px 12px; background: var(--teal); color: #fff; border: none; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;}
.jadwal-list, .surah-list, .h-content { flex: 1; overflow-y: auto; padding: 10px; }
.j-item, .surah-item { background: var(--cream); padding: 10px; border-radius: 9px; margin-bottom: 6px; border: 1px solid var(--cream-dark); display: flex; align-items: center; }
.j-item { justify-content: space-between; }
.j-time { font-weight: 700; color: var(--teal); font-size: 13px; }

/* Panel Quran & Hadis Lists */
.surah-item { gap: 10px; cursor: pointer; transition: background .2s; }
.surah-item:hover { background: #fff; }
.s-num { background: var(--teal-glow); color: var(--teal); width: 30px; height: 30px; border-radius: 6px; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s-info { flex: 1; overflow: hidden; }
.s-name { font-size: 12px; font-weight: 600; color: var(--ink-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-meta { font-size: 10px; color: var(--ink-muted); margin-top: 2px; }

/* Chat Area */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.msg-row { display: flex; gap: 10px; max-width: 720px; width: 100%; margin: 0 auto; animation: fadein .3s ease; }
@keyframes fadein { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
.msg-row.user { flex-direction: row-reverse; }
.msg-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
.msg-av.ai { background: linear-gradient(135deg, var(--teal), var(--teal-mid)); }
.msg-av.user { background: linear-gradient(135deg, var(--gold), var(--gold-l)); }
.msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; max-width: 85%; }
.msg-bubble.ai { background: var(--cream); border: 1px solid var(--cream-dark); border-bottom-left-radius: 4px; color: var(--ink); }
.msg-bubble.user { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }
.input-zone { background: rgba(255,255,255,.9); backdrop-filter: blur(5px); padding: 12px 16px; border-top: 1px solid var(--cream-dark); }
.topic-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; max-width: 720px; margin: 0 auto; }
.topic-row::-webkit-scrollbar { display: none; }
.t-pill { padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: 600; border: 1.5px solid var(--cream-dark); background: #fff; color: var(--ink-soft); cursor: pointer; white-space: nowrap; font-family: inherit;}
.t-pill.on { background: var(--teal); border-color: var(--teal); color: #fff; }
.input-row { display: flex; gap: 8px; max-width: 720px; margin: 0 auto; }
.input-field { flex: 1; padding: 12px 14px; border: 1.5px solid var(--cream-dark); border-radius: 12px; font-size: 14px; outline: none; font-family: inherit; }
.input-field:focus { border-color: var(--teal-light); }
.send-btn { width: 44px; background: var(--teal); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.error-banner { background: #fef2f2; color: #dc2626; padding: 10px; text-align: center; font-size: 12px; display: none; font-weight: 500; border-bottom: 1px solid #fca5a5;}

/* Modal (Popup Quran/Hadis) */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 15px; }
.modal { background: #fff; width: 100%; max-width: 550px; max-height: 85vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,.3); }
.modal-hdr { background: linear-gradient(135deg, var(--teal), var(--teal-mid)); padding: 16px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
.modal-hdr h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: rgba(255,255,255,.2); border: none; color: #fff; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-body { overflow-y: auto; padding: 16px; background: var(--cream); }
.ayat-item { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--cream-dark); box-shadow: 0 2px 5px rgba(0,0,0,.02); }
.ayat-ar { font-family: 'Amiri', serif; font-size: 20px; text-align: right; direction: rtl; line-height: 2.2; margin: 10px 0; color: var(--ink-mid); }
.ayat-tr { font-size: 13px; line-height: 1.6; color: var(--ink-soft); }
.btn-send { background: var(--teal-glow); color: var(--teal); border: 1px solid var(--teal-light); padding: 8px; width: 100%; border-radius: 8px; margin-top: 12px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: background .2s; }
.btn-send:hover { background: rgba(13,92,74,.2); }

@media (max-width: 768px) {
  .sidebar { position: absolute; height: calc(100vh - var(--header-h)); z-index: 40; box-shadow: 4px 0 20px rgba(0,0,0,.1); }
  .sidebar.closed { transform: translateX(-100%); width: var(--sidebar-w); box-shadow: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="h-logo">🕌</div>
  <div><div class="h-title">Penyuluh AI</div><div class="h-sub">Groq Engine · Kemenag API</div></div>
  <div class="h-right">
    <button class="h-reset" onclick="resetApiKey()" title="Ganti API Key Groq">🔑</button>
    <button class="menu-btn" onclick="toggleSidebar()" title="Buka Menu">☰</button>
  </div>
</header>
<div class="error-banner" id="errorBanner"></div>

<div class="app-body">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="s-tabs">
      <button class="s-tab on" onclick="setTab('sholat',this)">Sholat</button>
      <button class="s-tab" onclick="setTab('quran',this)">Qur'an</button>
      <button class="s-tab" onclick="setTab('hadis',this)">Hadis</button>
    </div>
    
    <!-- Panel Sholat -->
    <div class="s-panel on" id="panel-sholat">
      <div class="sh-hdr"><div class="sh-city" id="shCity">Pilih Kota Anda</div><div class="sh-date" id="shDate"></div></div>
      <div class="sh-search">
        <input id="kotaInput" placeholder="Ketik nama kota..." onkeydown="if(event.key==='Enter')cariKota()">
        <button class="sh-go" onclick="cariKota()">Cari</button>
      </div>
      <div class="jadwal-list" id="jadwalList">
        <div style="text-align:center; padding:20px; font-size:12px; color:var(--ink-muted);">Cari kota Anda untuk melihat jadwal sholat hari ini.</div>
      </div>
    </div>
    
    <!-- Panel Quran -->
    <div class="s-panel" id="panel-quran">
      <div class="q-search"><input id="surahSearch" placeholder="Cari nama surah..." oninput="filterSurah()"></div>
      <div class="surah-list" id="surahList">Memuat...</div>
    </div>
    
    <!-- Panel Hadis -->
    <div class="s-panel" id="panel-hadis">
      <div class="h-nav" style="flex-direction: column; gap: 8px;">
        <select id="hadisSelect" onchange="loadHadisList()">
          <option value="bukhari">Shahih Bukhari</option>
          <option value="muslim">Shahih Muslim</option>
          <option value="tirmidzi">Sunan Tirmidzi</option>
          <option value="nasai">Sunan Nasa'i</option>
          <option value="abu-dawud">Sunan Abu Dawud</option>
          <option value="ibnu-majah">Sunan Ibnu Majah</option>
        </select>
        <div style="display: flex; gap: 5px;">
          <input type="number" id="hadisSearch" placeholder="Cari No. Hadits..." onkeydown="if(event.key==='Enter')cariHadisNo()">
          <button class="sh-go" onclick="cariHadisNo()">Cari</button>
        </div>
      </div>
      <div class="surah-list" id="hadisList">Memuat...</div>
    </div>
  </aside>

  <!-- CHAT AREA -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div style="text-align:center; padding: 30px 20px; color: var(--ink-muted); font-size:14px; line-height: 1.6;">
        <div style="font-size: 40px; margin-bottom: 10px;">☪</div>
        <h2 style="color: var(--teal); margin-bottom: 5px;">Assalamu'alaikum</h2>
        Saya adalah AI Penyuluh Agama Islam.<br>Saya siap membantu memberikan pandangan agama berdasarkan Al-Qur'an dan Sunnah.
      </div>
    </div>
    <div class="input-zone">
      <div class="topic-row">
        <button class="t-pill on" onclick="setTopic(this,'')">Semua</button>
        <button class="t-pill" onclick="setTopic(this,'Fiqih')">Fiqih</button>
        <button class="t-pill" onclick="setTopic(this,'Akidah')">Akidah</button>
        <button class="t-pill" onclick="setTopic(this,'Tafsir')">Tafsir</button>
        <button class="t-pill" onclick="setTopic(this,'Hadits')">Hadits</button>
        <button class="t-pill" onclick="setTopic(this,'Keluarga')">Keluarga</button>
      </div>
      <div class="input-row">
        <input type="text" id="inputField" class="input-field" placeholder="Tanyakan permasalahan agama di sini..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </main>
</div>

<!-- MODAL (POPUP) -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">Surah / Hadits</h3>
      <button class="modal-close" onclick="document.getElementById('overlay').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ==========================================
// 1. SISTEM KEAMANAN API KEY GROQ
// ==========================================
let GROQ_API_KEY = localStorage.getItem('groq_api_key');

if (!GROQ_API_KEY || GROQ_API_KEY === 'null') {
  setTimeout(() => {
    GROQ_API_KEY = prompt(
      "🔑 Setup Groq AI:\n\n" +
      "Masukkan API Key Groq Anda untuk mengaktifkan AI.\n" +
      "Key ini hanya akan disimpan dengan aman di perangkat Anda (Local Storage)."
    );
    if (GROQ_API_KEY && GROQ_API_KEY.trim() !== '') {
      localStorage.setItem('groq_api_key', GROQ_API_KEY.trim());
    } else {
      showError("⚠️ Anda belum memasukkan API Key. AI tidak akan dapat merespons.");
    }
  }, 500);
}

function resetApiKey() {
  if(confirm("Apakah Anda yakin ingin menghapus/mengganti API Key Groq?")) {
    localStorage.removeItem('groq_api_key');
    location.reload();
  }
}

// ==========================================
// 2. UI LOGIC (Sidebar & Notifikasi)
// ==========================================
let isMobile = window.innerWidth <= 768;
let sidebarOpen = !isMobile;
if(isMobile) document.getElementById('sidebar').classList.add('closed');

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = msg; 
  b.style.display = msg ? 'block' : 'none';
}

let chatHistory = []; 
let currentTopic = ''; 

function setTab(name, el) {
  document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.s-panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); 
  document.getElementById('panel-'+name).classList.add('on');
}

function setTopic(el, t) {
  document.querySelectorAll('.t-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); 
  currentTopic = t;
}

// ==========================================
// 3. FUNGSI CHAT AI GROQ (Super Pintar & Cepat)
// ==========================================
async function sendMsg(textOverride) {
  const field = document.getElementById('inputField');
  const text = (textOverride || field.value).trim();
  if(!text) return;
  
  if (!GROQ_API_KEY || GROQ_API_KEY.trim() === '') {
    alert("API Key Groq belum dimasukkan. Silakan klik ikon kunci 🔑 merah di atas.");
    return;
  }

  field.value = '';
  if(isMobile && sidebarOpen) toggleSidebar(); 

  const msgs = document.getElementById('messages');
  msgs.innerHTML += `<div class="msg-row user"><div class="msg-av user">👤</div><div class="msg-bubble user">${text}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({role:'user', content:text});

  const typingId = 'typing-' + Date.now();
  msgs.innerHTML += `<div class="msg-row ai" id="${typingId}"><div class="msg-av ai">☪</div><div class="msg-bubble ai">Menyusun jawaban...</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const messagesToSend = [
      { 
        role: 'system', 
        content: `Anda adalah Penyuluh Agama Islam profesional di bawah naungan Kementerian Agama Indonesia. 
        Tugas Anda adalah memberikan bimbingan dan jawaban yang menyejukkan, moderat, dan menjaga kerukunan.
        
        Aturan wajib:
        1. Landasi jawaban dengan Al-Qur'an dan Sunnah.
        2. Jika membahas fiqih (khilafiyah), sebutkan pandangan mazhab umum di Indonesia (Syafi'i) dengan bijak.
        3. Gunakan bahasa Indonesia baku, santun, dan mudah dipahami.
        4. Jangan menghakimi. Arahkan pengguna ke ulama/KUA setempat untuk masalah spesifik yang rumit.
        
        Topik saat ini: ${currentTopic || 'Umum'}.` 
      },
      // Batasi memori hanya 6 chat terakhir agar hemat token & AI tetap fokus
      ...chatHistory.slice(-6) 
    ];

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile', 
        messages: messagesToSend,
        temperature: 0.2, // Rendah agar faktual dan akurat (tidak mengarang dalil)
        max_tokens: 1500
      })
    });

    const data = await response.json();

    if (!response.ok) {
        throw new Error(data.error?.message || "Gagal menghubungi server Groq.");
    }

    const replyRaw = data.choices[0].message.content; 
    document.getElementById(typingId).remove();
    showError(''); 
    
    // Format teks agar rapi
    let formattedReply = replyRaw.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    
    msgs.innerHTML += `<div class="msg-row ai"><div class="msg-av ai">☪</div><div class="msg-bubble ai">${formattedReply}</div></div>`;
    chatHistory.push({role:'assistant', content:replyRaw});
    msgs.scrollTop = msgs.scrollHeight;

  } catch(e) {
    document.getElementById(typingId).remove();
    showError("Groq Error: " + (e.message || "Pastikan API Key valid dan koneksi stabil."));
    chatHistory.pop();
  }
}

// ==========================================
// 4. JADWAL SHOLAT (api.myquran.com)
// ==========================================
async function cariKota() {
  const q = document.getElementById('kotaInput').value;
  if(!q) return;
  
  const list = document.getElementById('jadwalList');
  list.innerHTML = "<div style='text-align:center;padding:20px;'>Mencari...</div>";
  
  try {
      const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${q}`);
      const d = await res.json();
      if(d.data && d.data.length > 0) {
        document.getElementById('shCity').textContent = d.data[0].lokasi;
        const now = new Date();
        const r2 = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${d.data[0].id}/${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`);
        const d2 = await r2.json();
        const j = d2.data.jadwal;
        document.getElementById('shDate').textContent = j.tanggal;
        
        let html = '';
        ['imsak','subuh','terbit','dhuha','dzuhur','ashar','maghrib','isya'].forEach(k => {
          if(j[k]) html += `<div class="j-item"><span>${k.toUpperCase()}</span><span class="j-time">${j[k]}</span></div>`;
        });
        list.innerHTML = html;
      } else {
        list.innerHTML = "<div style='text-align:center;padding:20px;font-size:12px;'>Kota tidak ditemukan.</div>";
      }
  } catch(e) {
      list.innerHTML = "<div style='text-align:center;padding:20px;font-size:12px;color:red;'>Gagal memuat jadwal.</div>";
  }
}

// ==========================================
// 5. AL-QUR'AN (equran.id - Kemenag)
// ==========================================
let allSurah = [];
let currentAyatData = []; // Penyimpanan aman untuk menghindari error quote HTML

async function loadSurahList() {
  try {
    const res = await fetch('https://equran.id/api/v2/surat');
    const d = await res.json();
    allSurah = d.data;
    filterSurah();
  } catch(e) {
    document.getElementById('surahList').innerHTML = "<div style='text-align:center;padding:20px;font-size:12px;'>Gagal memuat daftar surah.</div>";
  }
}

function filterSurah() {
  const q = document.getElementById('surahSearch')?.value.toLowerCase() || '';
  const list = allSurah.filter(s => s.namaLatin.toLowerCase().includes(q));
  document.getElementById('surahList').innerHTML = list.map(s => 
    `<div class="surah-item" onclick="openSurah(${s.nomor}, '${s.namaLatin}')">
      <div class="s-num">${s.nomor}</div> 
      <div class="s-info">
        <div class="s-name">${s.namaLatin}</div>
        <div class="s-meta">${s.arti}</div>
      </div>
    </div>`
  ).join('');
}

async function openSurah(num, name) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('modalTitle').textContent = `QS. ${name}`;
  document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;'>Memuat ayat...</div>";
  try {
    const res = await fetch(`https://equran.id/api/v2/surat/${num}`);
    const d = await res.json();
    currentAyatData = d.data.ayat; // Simpan ke variabel global yang aman
    
    // Render menggunakan index array, tidak memasukkan teks ke dalam onclick
    document.getElementById('modalBody').innerHTML = currentAyatData.map((a, index) => 
      `<div class="ayat-item">
        <div class="s-num" style="margin-bottom:10px;">${a.nomorAyat}</div>
        <div class="ayat-ar">${a.teksArab}</div>
        <div class="ayat-tr">${a.teksIndonesia}</div>
        <button class="btn-send" onclick="triggerSendAyat('${name}', ${index})">Minta Penjelasan AI</button>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;color:red;'>Gagal memuat detail ayat.</div>";
  }
}

// Pengambil teks yang aman dari variabel array
function triggerSendAyat(surahName, index) {
  document.getElementById('overlay').style.display = 'none';
  const a = currentAyatData[index];
  sendMsg(`Tolong jelaskan makna dan tafsir dari QS ${surahName} ayat ${a.nomorAyat}:\n"${a.teksArab}"\n(Artinya: ${a.teksIndonesia})`);
}

// ==========================================
// 6. HADITS (api.hadith.gading.dev)
// ==========================================
let currentHadithText = ""; // Penyimpanan aman

async function loadHadisList() {
  const kit = document.getElementById('hadisSelect').value;
  const listEl = document.getElementById('hadisList');
  listEl.innerHTML = "<div style='text-align:center;padding:20px;font-size:12px;'>Memuat data...</div>";
  
  try {
    const res = await fetch(`https://api.hadith.gading.dev/books/${kit}?range=1-20`);
    const d = await res.json();
    
    listEl.innerHTML = d.data.hadiths.map(h => `
      <div class="surah-item" onclick="openHadis('${kit}', ${h.number})">
        <div class="s-num" style="min-width:35px;">${h.number}</div> 
        <div class="s-info">
          <div class="s-name" style="white-space:normal; -webkit-line-clamp:2; display:-webkit-box; -webkit-box-orient:vertical;">${h.id}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    listEl.innerHTML = "<div style='text-align:center;padding:20px;font-size:12px;color:red;'>Gagal memuat.</div>";
  }
}

function cariHadisNo() {
  const num = document.getElementById('hadisSearch').value;
  const kit = document.getElementById('hadisSelect').value;
  if(!num) { loadHadisList(); return; }
  openHadis(kit, num);
}

async function openHadis(kitab, number) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('modalTitle').textContent = `${kitab.toUpperCase()} - No. ${number}`;
  document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;'>Mencari hadits...</div>";
  
  try {
    const res = await fetch(`https://api.hadith.gading.dev/books/${kitab}/${number}`);
    const d = await res.json();
    
    if (d.code !== 200) {
        document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;'>Hadits nomor tersebut tidak ditemukan.</div>";
        return;
    }

    const h = d.data.contents;
    currentHadithText = h.id; // Simpan aman di memori
    
    document.getElementById('modalBody').innerHTML = `
      <div class="ayat-item">
        <div class="ayat-ar">${h.arab}</div>
        <div class="ayat-tr">${h.id}</div>
        <button class="btn-send" onclick="triggerSendHadis('${kitab}', ${h.number})">Tanyakan ke AI</button>
      </div>`;
  } catch(e) {
    document.getElementById('modalBody').innerHTML = "<div style='text-align:center;padding:20px;color:red;'>Gagal memuat hadits.</div>";
  }
}

// Fungsi eksekusi AI Hadits yang aman
function triggerSendHadis(kitab, nomor) {
  document.getElementById('overlay').style.display = 'none';
  sendMsg(`Tolong jelaskan makna, konteks, dan pelajaran yang bisa diambil dari hadits riwayat ${kitab} nomor ${nomor}:\n"${currentHadithText}"`);
}

// ==========================================
// INIT PERTAMA KALI JALAN
// ==========================================
window.onload = () => { 
  loadSurahList(); 
  loadHadisList(); 
};
